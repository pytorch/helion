name: Benchmark TPU

on:
  workflow_call:
    inputs:
      alias:
        required: true
        type: string
      kernels:
        required: true
        type: string
      env-vars:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  benchmark:
    name: benchmark-${{ inputs.alias }}-pallas

    env:
      HELION_BACKEND: pallas
      HELION_AUTOTUNE_LOG_LEVEL: INFO
      HELION_AUTOTUNE_EFFORT: full
      # Bump per-kernel timeout from the default 20 min. With --num-shapes 2
      # the budget covers BOTH shapes per kernel, and welford's autotune is
      # variable (10-25 min per shape under TPU contention), so 60 min total
      # gives safe headroom.
      HELION_BENCHMARK_KERNEL_TIMEOUT: "3600"

    runs-on: linux.google.tpuv7x.1

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: |
          uv venv --python 3.12

      - name: Install PyTorch (CPU nightly, pinned for TorchTPU)
        uses: ./.github/actions/install-pytorch-for-torchtpu

      - name: Install Helion
        run: |
          source .venv/bin/activate
          uv pip install setuptools ninja
          SETUPTOOLS_SCM_PRETEND_VERSION="0.0.0" uv pip install -e .'[dev]'
          python -c "import helion; print(helion.__name__)"

      - name: Build and install torch_tpu (Pallas)
        uses: ./.github/actions/build-torch-tpu

      - name: Run TPU Benchmark
        run: |
          source .venv/bin/activate

          TEST_REPORTS_DIR=$(pwd)/test/test-reports
          mkdir -p "$TEST_REPORTS_DIR"

          KERNELS="${{ inputs.kernels }}"
          # "all" (or empty) -> let run_tpu.py default to every kernel in
          # KERNEL_MAPPINGS. Single source of truth for the full kernel set
          # lives in the Python dict; YAML doesn't need to mirror it.
          if [[ "$KERNELS" == "all" || -z "$KERNELS" ]]; then
            KERNEL_FLAG=()
          else
            KERNEL_FLAG=(--kernel "$KERNELS")
          fi
          echo "=========================================="
          echo "TPU Benchmark"
          echo "Kernels: ${KERNELS:-all}"
          echo "=========================================="

          # Single combined pass — same shape as benchmarks/run.py for GPU.
          # HELION_MEASURE_COMPILE_TIME=1 has helion's compile-time tracker
          # capture per-shape autotune+codegen cost; run_example does its own
          # warmup so post-autotune latency measurements are stable.
          ${{ inputs.env-vars }} HELION_PRINT_OUTPUT_CODE=1 HELION_MEASURE_COMPILE_TIME=1 \
            python benchmarks/run_tpu.py \
              "${KERNEL_FLAG[@]}" \
              --num-shapes 2 \
              --subprocess-per-shape \
              --output "$TEST_REPORTS_DIR/helionbench.json"

          if [[ ! -s "$TEST_REPORTS_DIR/helionbench.json" ]]; then
            echo "❌ helionbench.json is missing or empty"
            exit 1
          fi
          cat "$TEST_REPORTS_DIR/helionbench.json"

      - name: Upload the benchmark results to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ inputs.alias }}
          path: test/test-reports
