name: Benchmark TPU Nightly

on:
  push:  # TODO: remove before merging — temporary trigger for CI testing
    branches:
      - yifeixu/tpu-nightly-benchmark
  schedule:
    - cron: '0 10 * * *'  # Runs at 2 AM PST (10 AM UTC)
  workflow_dispatch:
    inputs:
      kernels_tpu:
        description: 'Comma-separated list of kernels to benchmark on TPU'
        required: false
        type: string
        default: ''

jobs:
  dispatch-benchmark:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch benchmark_dispatch workflow (TPU only)
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const inputs = {
              run_h100: 'false',
              run_b200: 'false',
              run_mi350x: 'false',
              run_tpu: 'true',
            };
            const kernelsTpu = '${{ github.event.inputs.kernels_tpu }}';
            if (kernelsTpu) {
              inputs.kernels_tpu = kernelsTpu;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'benchmark_dispatch.yml',
              ref: context.ref.replace('refs/heads/', ''),
              inputs,
            })
