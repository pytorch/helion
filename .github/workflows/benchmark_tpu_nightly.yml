name: Benchmark TPU Nightly

on:
  push:  # TODO: remove before merging — temporary trigger for CI testing
    branches:
      - yifeixu/tpu-nightly-benchmark
  schedule:
    - cron: '0 10 * * *'  # Runs at 2 AM PST (10 AM UTC)
  workflow_dispatch:
    inputs:
      kernels:
        description: 'Comma-separated list of kernels to benchmark'
        required: false
        type: string
        # Excluded kernels:
        #   grpo_loss: complex multi-kernel setup, needs special handling
        #   jagged_hstu_attn: complex jagged attention with special data setup
        default: "exp,add,softmax_two_pass,welford,attention,bmm,broadcast_matmul,geglu,low_mem_dropout,swiglu,batch_softmax,sum,rms_norm,layer_norm,softmax"

permissions:
  contents: read

jobs:
  benchmark-tpu:
    uses: ./.github/workflows/benchmark_tpu.yml
    permissions:
      contents: read
    with:
      kernels: ${{ github.event.inputs.kernels || 'exp,add,softmax_two_pass,welford,attention,bmm,broadcast_matmul,geglu,low_mem_dropout,swiglu,batch_softmax,sum,rms_norm,layer_norm,softmax' }}
