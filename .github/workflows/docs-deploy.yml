name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["Benchmark Dispatch"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Create virtual environment
        run: |
          uv venv --python 3.12

      - name: Install docs requirements and project
        run: |
          source .venv/bin/activate
          uv pip install -e .[docs]

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build documentation
        run: |
          source .venv/bin/activate
          cd docs/
          make html

      - name: Build dashboard data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/dashboard/build_dashboard_data.py \
            --repo ${{ github.repository }} \
            --output ./dashboard-data.json

      - name: Add dashboard to site
        run: |
          mkdir -p ./site/dashboard
          cp .github/dashboard/index.html ./site/dashboard/index.html
          cp ./dashboard-data.json ./site/dashboard/dashboard-data.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
